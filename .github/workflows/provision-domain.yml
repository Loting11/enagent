name: Provision en.soundfield.fun HTTPS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload Nginx configuration and certificate
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          TLS_CERT: ${{ secrets.TLS_CERT }}
          TLS_KEY: ${{ secrets.TLS_KEY }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          USER="${DEPLOY_USER:-ubuntu}"
          test -n "$TLS_CERT"
          test -n "$TLS_KEY"
          printf '%s\n' "$TLS_CERT" > /tmp/en.soundfield.fun.fullchain.pem
          printf '%s\n' "$TLS_KEY" > /tmp/en.soundfield.fun.key
          chmod 600 /tmp/en.soundfield.fun.key
          ssh -i ~/.ssh/deploy -p "$PORT" "$USER@$DEPLOY_HOST" \
            'mkdir -p /home/ubuntu/english-agent/.deploy && chmod 700 /home/ubuntu/english-agent/.deploy'
          scp -i ~/.ssh/deploy -P "$PORT" \
            deploy/nginx/en.soundfield.fun.https.conf \
            "$USER@$DEPLOY_HOST:/home/ubuntu/english-agent/.deploy/"
          scp -i ~/.ssh/deploy -P "$PORT" \
            /tmp/en.soundfield.fun.fullchain.pem /tmp/en.soundfield.fun.key \
            "$USER@$DEPLOY_HOST:/home/ubuntu/english-agent/.deploy/"

      - name: Install certificate and enable HTTPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh -i ~/.ssh/deploy -p "${DEPLOY_PORT:-22}" \
            "${DEPLOY_USER:-ubuntu}@$DEPLOY_HOST" 'set -eu
              DOMAIN=en.soundfield.fun
              SITE=/etc/nginx/sites-available/$DOMAIN
              TRANSFER=/home/ubuntu/english-agent/.deploy
              sudo mkdir -p /etc/nginx/ssl /var/www/letsencrypt
              sudo install -m 644 "$TRANSFER/en.soundfield.fun.fullchain.pem" \
                /etc/nginx/ssl/en.soundfield.fun.fullchain.pem
              sudo install -m 600 "$TRANSFER/en.soundfield.fun.key" \
                /etc/nginx/ssl/en.soundfield.fun.key
              sudo install -m 644 "$TRANSFER/en.soundfield.fun.https.conf" "$SITE"
              sudo ln -sfn "$SITE" "/etc/nginx/sites-enabled/$DOMAIN"
              sudo nginx -t
              sudo systemctl reload nginx
              ENV_FILE=/home/ubuntu/english-agent/.env
              if grep -q "^TRUST_PROXY_HEADERS=" "$ENV_FILE"; then
                sed -i "s/^TRUST_PROXY_HEADERS=.*/TRUST_PROXY_HEADERS=true/" "$ENV_FILE"
              else
                printf "\nTRUST_PROXY_HEADERS=true\n" >> "$ENV_FILE"
              fi
              chmod 600 "$ENV_FILE"
              sudo systemctl restart english-agent
              rm -rf "$TRANSFER"
              curl --fail --silent --show-error \
                --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/api/health"'
