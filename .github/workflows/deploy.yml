name: Test and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: english-agent-production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          python3 -m pip install --disable-pip-version-check -r requirements.txt
          python3 -m unittest discover -s tests -v
          python3 -m py_compile src/*.py

      - name: Configure deployment SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/english_agent_deploy
          chmod 600 ~/.ssh/english_agent_deploy
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Build deployment package
        run: |
          tar -czf /tmp/english-agent.tgz \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.venv' \
            --exclude='data/*.db' \
            --exclude='work' \
            .

      - name: Upload and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          USER="${DEPLOY_USER:-ubuntu}"
          SSH="ssh -i ~/.ssh/english_agent_deploy -p $PORT -o BatchMode=yes"
          scp -i ~/.ssh/english_agent_deploy -P "$PORT" -o BatchMode=yes \
            /tmp/english-agent.tgz "$USER@$DEPLOY_HOST:/tmp/english-agent.tgz"
          $SSH "$USER@$DEPLOY_HOST" 'set -eu
            APP=/home/ubuntu/english-agent
            mkdir -p "$APP"
            tar -xzf /tmp/english-agent.tgz -C "$APP"
            rm -f /tmp/english-agent.tgz
            cd "$APP"
            test -f .env
            chmod 600 .env
            if ! test -x .venv/bin/python; then
              if ! python3 -m venv .venv; then
                sudo apt-get update -qq
                sudo apt-get install -y python3-venv
                python3 -m venv .venv
              fi
            fi
            if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            if ! command -v openclaw >/dev/null 2>&1; then
              curl -fsSL https://openclaw.ai/install.sh | bash
              if test -x "$HOME/.local/bin/openclaw"; then
                sudo ln -sf "$HOME/.local/bin/openclaw" /usr/local/bin/openclaw
              fi
            fi
            if command -v openclaw >/dev/null 2>&1; then
              openclaw plugins install @tencent-weixin/openclaw-weixin --force || true
              openclaw plugins enable openclaw-weixin || true
              openclaw config set gateway.mode local || true
              openclaw config set gateway.bind loopback || true
              openclaw config set gateway.port 19001 || true
              if ! openclaw config get gateway.auth.token >/dev/null 2>&1; then
                openclaw config set gateway.auth.mode token || true
                openclaw config set gateway.auth.token "$(python3 -c "import secrets; print(secrets.token_urlsafe(32))")" || true
              fi
              MODEL_API_KEY="$(grep -E "^MODEL_API_KEY=" .env | cut -d= -f2- || true)"
              OPENCLAW_CALLBACK_TOKEN="$(grep -E "^OPENCLAW_CALLBACK_TOKEN=" .env | cut -d= -f2- || true)"
              if test -n "$OPENCLAW_CALLBACK_TOKEN"; then
                printf "{\"env\":{\"vars\":{\"ENGLISH_AGENT_OPENCLAW_CALLBACK_URL\":\"http://127.0.0.1:8080/openclaw/callback?token=%s\"}}}\n" "$OPENCLAW_CALLBACK_TOKEN" | openclaw config patch --stdin || true
              fi
              if test -n "$MODEL_API_KEY"; then
                printf "%s\n" \
                  "{" \
                  "  \"models\": {" \
                  "    \"providers\": {" \
                  "      \"deepseek\": {" \
                  "        \"baseUrl\": \"https://api.deepseek.com\"," \
                  "        \"auth\": \"api-key\"," \
                  "        \"api\": \"openai-completions\"," \
                  "        \"models\": [" \
                  "          {\"id\": \"deepseek-chat\", \"name\": \"deepseek-chat\"}," \
                  "          {\"id\": \"deepseek-reasoner\", \"name\": \"deepseek-reasoner\"}" \
                  "        ]" \
                  "      }" \
                  "    }" \
                  "  }" \
                  "}" >/tmp/openclaw-models.patch.json
                openclaw config patch --file /tmp/openclaw-models.patch.json || true
                printf "%s\n" "$MODEL_API_KEY" | openclaw models auth paste-api-key --provider deepseek --profile-id deepseek:english-agent || true
                openclaw models set deepseek/deepseek-chat || true
              fi
              python3 deploy/patch_openclaw_weixin_bridge.py || true
              openclaw gateway install --force || true
              openclaw gateway start || openclaw gateway restart || true
            fi
            .venv/bin/pip install --disable-pip-version-check -q -r requirements.txt
            .venv/bin/python -m unittest discover -s tests -v
            .venv/bin/python -m py_compile src/*.py
            sudo install -m 644 deploy/english-agent.service /etc/systemd/system/english-agent.service
            sudo systemctl daemon-reload
            sudo systemctl enable english-agent >/dev/null
            sudo systemctl restart english-agent
            sleep 2
            systemctl is-active --quiet english-agent
            curl --fail --silent http://127.0.0.1:8080/api/health >/dev/null'
