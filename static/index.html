<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI English Agent</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/config.css">
</head>
<body>
  <main>
    <header>
      <div><span class="eyebrow">OPENCLAW AGENT OPS</span><h1>Agent 运营后台</h1></div>
      <div class="header-actions"><button id="openOpenclaw">微信 OpenClaw</button><button id="openJuhe">协议通道</button><button id="openWecom">官方应用</button><button id="logout">退出</button><button id="runPush" class="primary">执行推送</button></div>
    </header>

    <section id="stats" class="stats"></section>

    <section class="ops-layout">
      <nav class="ops-nav">
        <button class="active" data-view="dashboard">工作台</button>
        <button data-view="users">用户管理</button>
        <button data-view="products">Agent 产品</button>
        <button data-view="content">知识库</button>
        <button data-view="push">推送</button>
        <button data-view="messages">互动</button>
        <button data-view="billing">收费权益</button>
      </nav>
      <section class="ops-main">
        <section id="view-dashboard" class="view"></section>
        <section id="view-users" class="view" hidden></section>
        <section id="view-products" class="view" hidden></section>
        <section id="view-content" class="view" hidden></section>
        <section id="view-push" class="view" hidden></section>
        <section id="view-messages" class="view" hidden></section>
        <section id="view-billing" class="view" hidden></section>
      </section>
    </section>
  </main>
  <dialog id="contentDialog">
    <form id="contentForm">
      <div class="dialog-head"><div><span class="eyebrow">KNOWLEDGE</span><h2>知识库内容</h2></div><button type="button" id="closeContent" aria-label="关闭">×</button></div>
      <div class="form-grid">
        <label>所属产品<select name="product_key"></select></label>
        <label>内容类型<select name="content_type"><option value="knowledge_card">知识点卡片</option><option value="briefing">资讯/早报</option><option value="article">图文/长文</option><option value="link">外部链接</option></select></label>
        <label>标题<input name="term" autocomplete="off"></label>
        <label>摘要/含义<input name="meaning" autocomplete="off"></label>
        <label class="wide">正文/解读<textarea name="explanation" rows="4"></textarea></label>
        <label>英文例句/补充<input name="example_en" autocomplete="off"></label>
        <label>中文例句/补充<input name="example_cn" autocomplete="off"></label>
        <label class="wide">互动问题<input name="question" autocomplete="off"></label>
        <label class="wide">选项<textarea name="options" rows="3" placeholder="A. ...&#10;B. ...&#10;C. ..."></textarea></label>
        <label>答案<select name="answer"><option>A</option><option>B</option><option>C</option></select></label>
        <label>难度<select name="difficulty"><option>1</option><option>2</option><option>3</option></select></label>
        <label>主题<input name="topic" autocomplete="off"></label>
        <label>审核状态<select name="review_status"><option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已拒绝</option></select></label>
        <label>启用<select name="enabled"><option value="1">启用</option><option value="0">停用</option></select></label>
        <label class="wide">来源链接<input name="source_url" autocomplete="off"></label>
      </div>
      <div class="dialog-actions"><button type="button" id="cancelContent">取消</button><button class="primary" type="submit">保存</button></div>
    </form>
  </dialog>
  <dialog id="wecomDialog">
    <form id="wecomForm">
      <div class="dialog-head"><div><span class="eyebrow">INTEGRATION</span><h2>企业微信配置</h2></div><button type="button" id="closeWecom" aria-label="关闭">×</button></div>
      <div id="securityNotice" class="notice"></div>
      <div class="form-grid">
        <label>企业 ID（CorpID）<input name="corp_id" autocomplete="off" placeholder="wwxxxxxxxxxxxxxxxx"></label>
        <label>应用 AgentId<input name="agent_id" autocomplete="off" placeholder="例如 1000002"></label>
        <label>测试员工 UserID<input name="test_user_id" autocomplete="off" placeholder="通讯录中的账号"></label>
        <label>应用 Secret<input name="secret" type="password" autocomplete="new-password"><small data-status="secret"></small></label>
        <label>回调 Token<input name="token" type="password" autocomplete="new-password"><small data-status="token"></small></label>
        <label>EncodingAESKey<input name="encoding_aes_key" type="password" autocomplete="new-password" maxlength="43"><small data-status="encoding_aes_key"></small></label>
      </div>
      <div id="wecomStatus" class="integration-status"></div>
      <div class="callback"><span>后续回调路径</span><code id="callbackUrl"></code></div>
      <div class="dialog-actions"><button type="button" id="testWecom">测试连接</button><button type="button" id="cancelWecom">取消</button><button class="primary" type="submit">保存配置</button></div>
    </form>
  </dialog>
  <dialog id="juheDialog">
    <form id="juheForm">
      <div class="dialog-head"><div><span class="eyebrow">PROTOCOL CHANNEL</span><h2>聚合聊天配置</h2></div><button type="button" id="closeJuhe" aria-label="关闭">×</button></div>
      <div id="juheSecurityNotice" class="notice"></div>
      <div class="form-grid">
        <label>开放平台地址<input name="api_url" autocomplete="off" placeholder="https://chat-api.juhebot.com/open/GuidRequest"></label>
        <label>App Key<input name="app_key" autocomplete="off"></label>
        <label>设备 GUID<input name="guid" autocomplete="off" placeholder="设备列表中的设备ID"></label>
        <label>App Secret<input name="app_secret" type="password" autocomplete="new-password"><small data-juhe-status="app_secret"></small></label>
        <label>私有 CDN 地址（语音/文件）<input name="private_cdn_url" type="password" autocomplete="new-password" placeholder="由供应商提供"><small data-juhe-status="private_cdn_url"></small></label>
      </div>
      <div id="juheStatus" class="integration-status"></div>
      <div class="callback"><span>将此地址填写到供应商的“实例通知地址”</span><code id="juheCallbackUrl"></code></div>
      <div class="dialog-actions"><button type="button" id="testJuhe">验证凭证</button><button type="button" id="registerJuheCallback">注册回调</button><button type="button" id="cancelJuhe">取消</button><button class="primary" type="submit">保存配置</button></div>
    </form>
  </dialog>
  <dialog id="openclawDialog">
    <form id="openclawForm">
      <div class="dialog-head"><div><span class="eyebrow">WECHAT BOT</span><h2>微信 OpenClaw 入口</h2></div><button type="button" id="closeOpenclaw" aria-label="关闭">×</button></div>
      <div class="notice safe">用于微信扫码登录一个 OpenClaw bot，再把微信私聊转入当前英语订阅 Agent。</div>
      <div class="form-grid">
        <label>启用入口<select name="enabled"><option value="false">暂不启用</option><option value="true">启用</option></select></label>
        <label>Bot 名称<input name="bot_name" autocomplete="off" placeholder="AI 英语订阅助手"></label>
        <label>OpenClaw CLI 路径<input name="cli_path" autocomplete="off"></label>
        <label>渠道 ID<input name="channel" autocomplete="off" placeholder="openclaw-weixin"></label>
        <label>微信账号 ID<input name="account_id" autocomplete="off" placeholder="扫码登录后生成的 accountId"></label>
      </div>
      <div id="openclawStatus" class="integration-status"></div>
      <div class="openclaw-account-pool">
        <div class="panel-title"><h2>微信 bot 账号池</h2><button type="button" id="saveOpenclawAccount">保存为账号</button></div>
        <div id="openclawAccounts" class="account-list"></div>
      </div>
      <div class="callback"><span>OpenClaw agent 转发到此回调地址</span><code id="openclawCallbackUrl"></code></div>
      <div id="openclawOutputPanel" class="openclaw-output-panel" hidden>
        <div class="openclaw-output-head"><span id="openclawOutputTitle">二维码输出</span><small id="openclawOutputHint">请用微信扫码完成绑定</small></div>
        <pre id="openclawOutput" class="command-output"></pre>
      </div>
      <div class="dialog-actions"><button type="button" id="startOpenclawLogin">生成登录二维码</button><button type="button" id="stopOpenclawLogin">停止</button><button type="button" id="checkOpenclaw">检查状态</button><button type="button" id="cancelOpenclaw">取消</button><button class="primary" type="submit">保存默认配置</button></div>
    </form>
  </dialog>
  <div id="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
